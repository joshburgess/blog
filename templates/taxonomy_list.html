<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title }} — {{ site.title }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    {% if assets.css_path %}<link rel="stylesheet" href="/blog{{ assets.css_path }}">{% endif %}
    <script>
      (function(){var t=localStorage.getItem('theme');if(!t)t=window.matchMedia('(prefers-color-scheme:light)').matches?'light':'dark';document.documentElement.setAttribute('data-theme',t)})();
    </script>
</head>
<body>
    <header class="site-header">
        <div class="container">
            <div class="site-title"><a href="/blog/">{{ site.title }}</a></div>
            <nav class="site-nav">
                <a href="/blog/">Posts</a>
                <a href="/blog/about/">About</a>
                <a href="/blog/tags/">Tags</a>
                <a href="/blog/feed.xml">RSS</a>
                <button class="theme-toggle" aria-label="Toggle theme">
                    <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                    <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                </button>
            </nav>
        </div>
    </header>
    <main class="container">
        <h1 class="taxonomy-term-heading">{{ page.title }}</h1>
        {{ content | safe }}
    </main>
    <footer class="site-footer">
        <div class="container">
            <p>Built with <a href="https://github.com/joshburgess/mythic">Mythic</a></p>
            <p>&copy; 2026 Josh Burgess</p>
        </div>
    </footer>
    {% if assets.js_path %}<script src="/blog{{ assets.js_path }}"></script>{% endif %}
</body>
</html>
