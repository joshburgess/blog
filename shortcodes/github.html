<a href="https://github.com/{{ repo }}" style="display:block;padding:1rem;margin:1rem 0;border:1px solid var(--border);border-radius:var(--radius);text-decoration:none;color:inherit;transition:border-color 0.2s" onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor=''">
  <strong style="color:var(--accent)">{{ repo }}</strong>
  {% if description %}<p style="margin:0.25rem 0 0;color:var(--text-muted);font-size:0.9rem">{{ description }}</p>{% endif %}
</a>
