<div style="padding:1rem 1.25rem;margin:1.5rem 0;border-left:4px solid var(--blockquote-border);background:var(--bg-secondary);border-radius:0 var(--radius-small) var(--radius-small) 0;color:var(--text-secondary)">
  {% if type == 'warning' %}<strong>Warning:</strong> {% elif type == 'danger' %}<strong>Danger:</strong> {% elif type == 'tip' %}<strong>Tip:</strong> {% else %}<strong>Note:</strong> {% endif %}{{ inner | safe }}
</div>
