<details style="margin:1rem 0;padding:0.5rem 1rem;border:1px solid var(--border);border-radius:var(--radius-small)">
  <summary style="cursor:pointer;font-weight:600;color:var(--text)">{{ summary }}</summary>
  <div style="margin-top:0.75rem;color:var(--text-secondary)">{{ inner | safe }}</div>
</details>
